# .king/coverage.yaml — generado por /genesis
# King Framework Coverage Gate (M-12)
#
# Copia este archivo a .king/coverage.yaml y ajusta los valores.
# Referencia: knowledge/universal/coverage-gate.md
#
# El gate se evalúa automáticamente vía PostToolUse hook cada vez que
# Claude Code ejecuta una herramienta Bash que produce output de test runner.

thresholds:
  # Threshold global del proyecto (0–100). Default: 80.
  global: 80

  # Overrides por paquete/directorio (opcional).
  # Ejemplo: src/core: 95  (código crítico requiere cobertura más alta)
  per_package: {}

  # Threshold por tipo de branch (opcional, hereda global si ausente).
  per_branch_type:
    feature: 80
    hotfix: 70
    release: 90

  # enforcement: block → exit 2 (bloquea la operación)
  #              warn  → exit 0 + entrada en audit log (audited bypass)
  enforcement: block

  # Patrones de archivos excluidos del análisis.
  # Mantener mínimo — excluir demasiado oculta deuda real.
  exclude:
    - "**/*.generated.*"
    - "**/mocks/**"
    - "**/testdata/**"

audit:
  # Ruta del log de bypasses auditados (enforcement: warn).
  # Cada entrada incluye timestamp ISO-8601 + cobertura real + threshold.
  log: .king/audit/coverage-bypass.log
  # Si true, require una justificación en el log al hacer bypass.
  require_justification: true
