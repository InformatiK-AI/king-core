# .king/coverage.yaml
# Coverage Gate — Configuración por proyecto
#
# Copia este archivo a .king/coverage.yaml y ajusta los valores.
# Referencia completa: king-framework/rules/coverage-gate.md
#
# El gate se ejecuta automáticamente en:
#   /build  — Fase 5, step 5.8 (scope: diff, solo archivos del branch)
#   /promote — Fase 1, step 1.4 (scope: full, cobertura total del proyecto)

# Modo de ejecución:
#   warn  — muestra advertencia pero no bloquea (recomendado para proyectos nuevos)
#   error — bloquea /build y /promote si la cobertura está por debajo del threshold
mode: warn

# Thresholds mínimos de cobertura (0–100, enteros)
thresholds:
  overall: 80    # % mínimo de líneas cubiertas en todo el proyecto
  branches: 70   # % mínimo de branches (ramas condicionales) cubiertas

  # critical: 90  # OPCIONAL — se evalúa SOLO si critical_paths está definido abajo.
  #               # Si critical_paths no está definido, este valor se ignora.

# Paths críticos (threshold crítico aplica solo a estos directorios/archivos)
# critical_paths:
#   - src/core/
#   - src/auth/
#   - src/payments/

# Habilitar o deshabilitar completamente el gate
enabled: true

# Scope de cobertura por skill:
#   diff — solo archivos modificados en el branch actual (rápido, usado en /build)
#   full — cobertura total del proyecto (preciso, usado en /promote)
build_scope: diff
promote_scope: full

# Patrones a excluir del análisis de cobertura (opcional)
# exclude:
#   - "**/*.test.ts"
#   - "**/*.spec.js"
#   - "**/mocks/**"
#   - "**/fixtures/**"
